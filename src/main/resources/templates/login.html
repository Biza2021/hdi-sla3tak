<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" th:attr="dir=${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title th:text="${#messages.msg('login.title') + ' - ' + appDisplayName}">Login - Hdi Sla3tak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="login-body">
<div class="container-fluid py-3 px-3 px-lg-4">
    <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-light border rounded-pill btn-sm" th:href="@{/login(lang='fr')}">FR</a>
        <a class="btn btn-light border rounded-pill btn-sm" th:href="@{/login(lang='ar')}">AR</a>
    </div>
</div>
<div class="login-wrapper pt-0">
    <div class="login-card shadow-xl">
        <div class="text-center mb-4">
            <div class="brand-mark mx-auto mb-3"><img class="brand-logo" th:src="@{/img/logo.png}" alt="Logo"></div>
            <h1 class="mb-2" th:text="${appDisplayName}">Hdi Sla3tak</h1>
            <p class="text-secondary mb-0" th:text="#{login.subtitle}">Track repairs, prove ownership, and deliver items confidently.</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger rounded-4 border-0" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success rounded-4 border-0" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label class="form-label" th:text="#{login.username}">Username</label>
                <input class="form-control form-control-lg soft-input" name="username" th:placeholder="#{login.usernamePlaceholder}" required>
            </div>
            <div>
                <label class="form-label" th:text="#{login.password}">Password</label>
                <input type="password" class="form-control form-control-lg soft-input" name="password" th:placeholder="#{login.passwordPlaceholder}" required>
            </div>
            <button class="btn btn-primary btn-lg rounded-pill" th:text="#{login.button}">Login</button>
        </form>

        <div class="small text-muted mt-4" th:text="#{login.ownerNotice}">The owner creates the first admin account during setup.</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
