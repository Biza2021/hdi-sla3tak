<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section th:fragment="content">
    <div class="card-surface p-3 p-lg-4 mb-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="section-title mb-1" th:text="#{settings.businessName}">Business name</h3>
                <div class="text-secondary small" th:text="#{settings.businessNameHelp}">Used in branding, tracking, and SMS compose messages.</div>
            </div>
        </div>
        <form th:action="@{/admin/users/business-name}" th:object="${businessNameForm}" method="post" class="row g-2 align-items-start">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="col-12 col-lg-8">
                <input class="form-control soft-input" th:field="*{businessName}">
                <div class="field-error" th:if="${#fields.hasErrors('businessName')}" th:errors="*{businessName}"></div>
            </div>
            <div class="col-12 col-lg-4 d-grid">
                <button class="btn btn-primary rounded-pill" th:text="#{settings.updateBusinessName}">Update business name</button>
            </div>
        </form>
    </div>
    <div class="card-surface p-3 p-lg-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="section-title mb-1" th:text="#{users.title}">Users</h3>
                <div class="text-secondary small" th:text="#{users.subtitle}">Manage staff accounts, passwords, and roles.</div>
            </div>
            <a class="btn btn-primary rounded-pill" th:href="@{/admin/users/new}" th:text="#{users.add}">New user</a>
        </div>
        <div class="row g-3" th:if="${!#lists.isEmpty(users)}">
            <div class="col-12 col-lg-6" th:each="user : ${users}">
                <div class="app-card p-3 h-100">
                    <div class="d-flex justify-content-between gap-2 align-items-start">
                        <div>
                            <div class="fw-semibold" th:text="${user.fullName}"></div>
                            <div class="small text-secondary" th:text="${user.username}"></div>
                            <div class="small mt-2"><span class="status-chip" th:text="${@labels.role(user.role)}"></span></div>
                            <div class="small text-secondary mt-2" th:text="${user.active ? @labels.msg('users.active') : @labels.msg('users.inactive')}"></div>
                        </div>
                        <div class="d-flex gap-2 flex-wrap justify-content-end">
                            <a class="btn btn-sm btn-outline-dark rounded-pill" th:href="@{/admin/users/{id}/edit(id=${user.id})}" th:text="#{action.edit}">Edit</a>
                            <a class="btn btn-sm btn-outline-dark rounded-pill" th:href="@{/admin/users/{id}/password(id=${user.id})}" th:text="#{users.changePassword}">Password</a>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" onsubmit="return confirm('Delete this user?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-danger rounded-pill" th:text="#{action.delete}">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
