<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section th:fragment="content">
    <div class="card-surface p-3 p-lg-4">
        <div class="mb-3">
            <div class="small text-secondary" th:text="${user.username}">username</div>
            <div class="fw-semibold" th:text="${user.fullName}">User</div>
        </div>
        <form th:action="@{/admin/users/{id}/password(id=${user.id})}" th:object="${userPasswordForm}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label class="form-label" th:text="#{users.newPassword}">New password</label>
                <input type="password" class="form-control soft-input" th:field="*{password}">
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{users.confirmPassword}">Confirm password</label>
                <input type="password" class="form-control soft-input" th:field="*{confirmPassword}">
                <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-primary rounded-pill px-4" th:text="#{users.changePassword}">Change password</button>
                <a class="btn btn-outline-dark rounded-pill px-4" th:href="@{/admin/users}" th:text="#{action.cancel}">Cancel</a>
            </div>
        </form>
    </div>
</section>
</html>
