<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section th:fragment="content">
    <div class="card-surface p-3 p-lg-4">
        <form th:action="${editing} ? @{/{shopSlug}/admin/users/{id}(shopSlug=${currentShopSlug},id=${user.id})} : @{/{shopSlug}/admin/users(shopSlug=${currentShopSlug})}" th:object="${userForm}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label class="form-label" th:text="#{users.fullName}">Full name</label>
                <input class="form-control soft-input" th:field="*{fullName}">
                <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{users.username}">Username</label>
                <input class="form-control soft-input" th:field="*{username}">
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div th:if="${!editing}">
                <label class="form-label" th:text="#{users.password}">Password</label>
                <input type="password" class="form-control soft-input" th:field="*{password}">
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{users.role}">Role</label>
                <select class="form-select soft-input" th:field="*{role}">
                    <option th:each="role : ${userRoles}" th:value="${role}" th:text="${@labels.role(role)}"></option>
                </select>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" th:field="*{active}">
                <label class="form-check-label" th:text="#{users.activeToggle}">Active account</label>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-primary rounded-pill px-4" th:text="${editing} ? @labels.msg('action.saveChanges') : @labels.msg('users.createButton')}">Save</button>
                <a class="btn btn-outline-dark rounded-pill px-4" th:href="@{/{shopSlug}/admin/users(shopSlug=${currentShopSlug})}" th:text="#{action.cancel}">Cancel</a>
            </div>
        </form>
    </div>
</section>
</html>
