<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" th:attr="dir=${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title th:text="${#messages.msg('track.title') + ' - ' + appDisplayName}">Repair tracking - Hdi Sla3tak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="login-body">
<div class="login-wrapper py-4">
    <div class="receipt-card card-surface">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="brand-mark">HS</div>
            <div>
                <div class="fw-semibold" th:text="${appDisplayName}">Hdi Sla3tak</div>
                <div class="text-secondary" th:text="#{track.subtitle}">Follow the progress of your repair item.</div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-5">
                <img class="detail-image" th:src="${item.imagePath != null} ? @{/uploads/{path}(path=${item.imagePath})} : @{/img/placeholder-item.svg}" alt="item">
            </div>
            <div class="col-12 col-lg-7">
                <div class="detail-row"><span th:text="#{items.itemTitle}">Item title</span><strong th:text="${item.title}"></strong></div>
                <div class="detail-row"><span th:text="#{items.category}">Category</span><strong th:text="${@labels.category(item.category)}"></strong></div>
                <div class="detail-row"><span th:text="#{items.dateReceived}">Date received</span><strong th:text="${#temporals.format(item.dateReceived, 'yyyy-MM-dd')}"></strong></div>
                <div class="detail-row">
                    <span th:text="#{items.status}">Status</span>
                    <span class="status-chip" th:classappend="${' status-' + #strings.replace(item.status.name().toLowerCase(), '_', '-')}" th:text="${@labels.status(item.status)}"></span>
                </div>
                <div class="detail-row"><span th:text="#{items.pickupCode}">Pickup code</span><strong th:text="${item.pickupCode}"></strong></div>
                <div class="detail-row" th:if="${item.expectedDeliveryDate != null}">
                    <span th:text="#{items.expectedDelivery}">Expected delivery date</span>
                    <strong th:text="${#temporals.format(item.expectedDeliveryDate, 'yyyy-MM-dd')}"></strong>
                </div>
            </div>
        </div>

        <div class="card-surface p-4 mt-4" th:if="${item.description != null and !#strings.isEmpty(item.description)}">
            <h3 class="section-title" th:text="#{track.note}">Note</h3>
            <p class="mb-0" th:text="${item.description}"></p>
        </div>

        <div class="alert alert-info rounded-4 border-0 mt-4 mb-0" th:text="#{track.pickupCodeHelp}">
            Keep this pickup code available when collecting your item.
        </div>
    </div>
</div>
</body>
</html>
