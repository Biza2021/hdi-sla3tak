<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" th:attr="dir=${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title th:text="${#messages.msg('track.notFoundTitle') + ' - ' + appDisplayName}">Tracking unavailable - Hdi Sla3tak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="login-body">
<div class="login-wrapper py-4">
    <div class="login-card text-center">
        <div class="brand-mark mx-auto mb-3">HS</div>
        <div class="fw-semibold mb-3" th:text="${appDisplayName}">Hdi Sla3tak</div>
        <h1 class="mb-3" th:text="#{track.notFoundTitle}">Tracking unavailable</h1>
        <p class="text-secondary mb-0" th:text="#{track.notFoundMessage}">
            This tracking link is invalid or no longer available.
        </p>
    </div>
</div>
</body>
</html>
