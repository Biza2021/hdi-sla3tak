<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" th:attr="dir=${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title th:text="${#messages.msg('setup.title') + ' - ' + appDisplayName}">Setup - Hdi Sla3tak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="login-body">
<div class="container-fluid py-3 px-3 px-lg-4">
    <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-light border rounded-pill btn-sm" th:href="@{/setup(lang='fr')}">FR</a>
        <a class="btn btn-light border rounded-pill btn-sm" th:href="@{/setup(lang='ar')}">AR</a>
    </div>
</div>
<div class="login-wrapper pt-0">
    <div class="login-card shadow-xl">
        <div class="text-center mb-4">
            <div class="brand-mark mx-auto mb-3"><img class="brand-logo" th:src="@{/img/logo.png}" alt="Logo"></div>
            <h1 class="mb-2" th:text="#{setup.heading}">Create owner account</h1>
            <p class="text-secondary mb-0" th:text="#{setup.subtitle}">Create the first admin account. After that, staff accounts can be managed from inside the app.</p>
        </div>

        <form th:action="@{/setup}" th:object="${setupOwnerForm}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label class="form-label" th:text="#{setup.businessName}">Business name</label>
                <input class="form-control form-control-lg soft-input" th:field="*{businessName}">
                <div class="field-error" th:if="${#fields.hasErrors('businessName')}" th:errors="*{businessName}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{setup.fullName}">Full name</label>
                <input class="form-control form-control-lg soft-input" th:field="*{fullName}">
                <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{setup.username}">Username</label>
                <input class="form-control form-control-lg soft-input" th:field="*{username}">
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{setup.password}">Password</label>
                <input type="password" class="form-control form-control-lg soft-input" th:field="*{password}">
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div>
                <label class="form-label" th:text="#{setup.confirmPassword}">Confirm password</label>
                <input type="password" class="form-control form-control-lg soft-input" th:field="*{confirmPassword}">
                <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <button class="btn btn-primary btn-lg rounded-pill" th:text="#{setup.button}">Create owner account</button>
        </form>
    </div>
</div>
</body>
</html>
