<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)"
      th:lang="${#locale.language}"
      th:attr="dir=${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title th:text="${pageTitleKey != null ? @labels.msg(pageTitleKey) + ' - ' + appDisplayName : appDisplayName}">Hdi Sla3tak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <header class="topbar d-lg-none">
        <div class="container-fluid d-flex align-items-center justify-content-between gap-2 py-3">
            <div class="brand-mark"><img class="brand-logo" th:src="@{/img/logo.png}" alt="Logo"></div>
            <div class="text-center flex-grow-1">
                <div class="fw-semibold" th:text="${appDisplayName}">Hdi Sla3tak</div>
                <div class="small text-secondary" th:text="#{layout.mobileSubtitle}">Repair flow</div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="lang-switch d-flex gap-1">
                    <a class="btn btn-light border rounded-pill btn-sm" th:href="${currentPath + '?lang=fr'}">FR</a>
                    <a class="btn btn-light border rounded-pill btn-sm" th:href="${currentPath + '?lang=ar'}">AR</a>
                </div>
                <button class="btn btn-light border rounded-pill" data-bs-toggle="offcanvas" th:attr="data-bs-target=${#locale.language == 'ar' ? '#mobileMenuAr' : '#mobileMenu'}">
                    <i class="bi bi-list fs-5"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu" th:if="${#locale.language != 'ar'}">
        <div class="offcanvas-header">
            <div>
                <h5 class="mb-0" th:text="${appDisplayName}">Hdi Sla3tak</h5>
                <small class="text-muted" th:text="#{layout.shopNavigation}">Shop navigation</small>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav th:replace="~{layout :: navLinks}"></nav>
        </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenuAr" th:if="${#locale.language == 'ar'}">
        <div class="offcanvas-header">
            <div>
                <h5 class="mb-0" th:text="${appDisplayName}">Hdi Sla3tak</h5>
                <small class="text-muted" th:text="#{layout.shopNavigation}">التنقل</small>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav th:replace="~{layout :: navLinks}"></nav>
        </div>
    </div>

    <aside class="sidebar d-none d-lg-flex flex-column" th:fragment="sidebar">
        <div class="p-4 border-bottom border-white border-opacity-10">
            <div class="brand-mark mb-2"><img class="brand-logo" th:src="@{/img/logo.png}" alt="Logo"></div>
            <h4 class="mb-1" th:text="${appDisplayName}">Hdi Sla3tak</h4>
            <p class="text-white-50 mb-0" th:text="#{layout.sidebarSubtitle}">Repair workflow</p>
        </div>
        <nav class="p-3" th:fragment="navLinks">
            <a class="nav-chip" th:href="@{/{shopSlug}(shopSlug=${currentShopSlug})}"><i class="bi bi-speedometer2"></i><span th:text="#{nav.dashboard}">Dashboard</span></a>
            <a class="nav-chip" th:href="@{/{shopSlug}/customers(shopSlug=${currentShopSlug})}"><i class="bi bi-people"></i><span th:text="#{nav.customers}">Customers</span></a>
            <a class="nav-chip" th:href="@{/{shopSlug}/items(shopSlug=${currentShopSlug})}"><i class="bi bi-tools"></i><span th:text="#{nav.repairs}">Repairs</span></a>
            <a class="nav-chip" th:href="@{/{shopSlug}/items/delivery(shopSlug=${currentShopSlug})}"><i class="bi bi-patch-check"></i><span th:text="#{nav.delivery}">Delivery</span></a>
            <a class="nav-chip" th:if="${isAdmin}" th:href="@{/{shopSlug}/admin/users(shopSlug=${currentShopSlug})}"><i class="bi bi-person-gear"></i><span th:text="#{nav.users}">Users</span></a>
        </nav>
        <div class="px-3 pb-3">
            <div class="card bg-transparent border border-light border-opacity-10 rounded-4">
                <div class="card-body">
                    <div class="small text-white-50 mb-2" th:text="#{lang.current}">Language</div>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-light rounded-pill btn-sm w-100" th:href="${currentPath + '?lang=fr'}">FR</a>
                        <a class="btn btn-outline-light rounded-pill btn-sm w-100" th:href="${currentPath + '?lang=ar'}">AR</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-auto p-3 border-top border-white border-opacity-10">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="shopSlug" th:value="${currentShopSlug}">
                <button class="btn btn-outline-light w-100 rounded-pill" type="submit" th:text="#{nav.logout}">Logout</button>
            </form>
        </div>
    </aside>

    <main class="main-panel">
        <div class="desktop-only d-none d-lg-flex" th:replace="~{layout :: sidebar}"></div>
        <div class="content-area">
            <div class="container-fluid px-3 px-lg-4 py-3 py-lg-4">
                <div class="page-header card-surface mb-3 mb-lg-4">
                    <div>
                        <div class="eyebrow" th:text="#{layout.eyebrow}">Repair shop control</div>
                        <h1 class="page-title" th:text="${pageTitleKey != null ? @labels.msg(pageTitleKey) : @labels.msg('nav.dashboard')}">Dashboard</h1>
                        <p class="page-subtitle" th:text="${pageSubtitleKey != null ? @labels.msg(pageSubtitleKey) : @labels.msg('layout.defaultSubtitle')}"></p>
                    </div>
                    <div class="text-end d-none d-md-block">
                        <span class="verification-pill"><i class="bi bi-shield-check me-1"></i><span th:text="#{layout.verifyRule}">Verify by phone + photo + pickup code</span></span>
                    </div>
                </div>

                <div th:if="${success}" class="alert alert-success rounded-4 border-0 shadow-sm" th:text="${success}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger rounded-4 border-0 shadow-sm" th:text="${errorMessage}"></div>
                <div th:if="${successMessage}" class="alert alert-success rounded-4 border-0 shadow-sm" th:text="${successMessage}"></div>

                <div th:replace="${content}"></div>
            </div>
        </div>
    </main>
</div>

<nav class="mobile-bottom-nav d-lg-none">
    <a th:href="@{/{shopSlug}(shopSlug=${currentShopSlug})}"><i class="bi bi-speedometer2"></i><span th:text="#{mobile.home}">Home</span></a>
    <a th:href="@{/{shopSlug}/customers(shopSlug=${currentShopSlug})}"><i class="bi bi-people"></i><span th:text="#{mobile.customers}">Customers</span></a>
    <a th:href="@{/{shopSlug}/items/new(shopSlug=${currentShopSlug})}"><i class="bi bi-plus-circle"></i><span th:text="#{mobile.addItem}">Add item</span></a>
    <a th:href="@{/{shopSlug}/items/delivery(shopSlug=${currentShopSlug})}"><i class="bi bi-patch-check"></i><span th:text="#{mobile.deliver}">Deliver</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
