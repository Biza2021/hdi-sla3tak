<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${#messages.msg('receipt.title') + ' - ' + item.pickupCode}">Receipt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="receipt-body">
<div class="receipt-card">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <div class="brand-mark mb-2">HS</div>
            <h2 class="mb-1" th:text="${appDisplayName}">Hdi Sla3tak</h2>
            <p class="text-secondary mb-0" th:text="#{receipt.subtitle}">Repair intake receipt</p>
        </div>
        <button class="btn btn-dark rounded-pill" onclick="window.print()" th:text="#{receipt.print}">Print</button>
    </div>

    <div class="receipt-grid">
        <div><span th:text="#{items.pickupCode}">Pickup code</span><strong th:text="${item.pickupCode}"></strong></div>
        <div><span th:text="#{customers.fullName}">Customer</span><strong th:text="${item.customer.fullName}"></strong></div>
        <div><span th:text="#{customers.phone}">Phone</span><strong th:text="${item.customer.phoneNumber}"></strong></div>
        <div><span th:text="#{items.itemTitle}">Item</span><strong th:text="${item.title}"></strong></div>
        <div><span th:text="#{items.category}">Category</span><strong th:text="${@labels.category(item.category)}"></strong></div>
        <div><span th:text="#{items.dateReceived}">Received</span><strong th:text="${#temporals.format(item.dateReceived, 'yyyy-MM-dd')}"></strong></div>
    </div>
</div>
</body>
</html>
