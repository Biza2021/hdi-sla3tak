<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section th:fragment="content">
    <div class="row g-3 g-lg-4">
        <div class="col-lg-5">
            <div class="card-surface p-4 h-100">
                <img class="detail-image mb-3" th:src="${item.imagePath != null} ? @{/uploads/{path}(path=${item.imagePath})} : @{/img/placeholder-item.svg}" alt="item">
                <div class="detail-row"><span th:text="#{items.itemTitle}">Item</span><strong th:text="${item.title}"></strong></div>
                <div class="detail-row"><span th:text="#{items.customer}">Customer</span><strong th:text="${item.customer.fullName}"></strong></div>
                <div class="detail-row"><span th:text="#{customers.phone}">Phone</span><strong th:text="${item.customer.phoneNumber}"></strong></div>
                <div class="detail-row"><span th:text="#{items.pickupCode}">Pickup code</span><strong th:text="${item.pickupCode}"></strong></div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card-surface p-4">
                <h3 class="section-title" th:text="#{deliver.heading}">Confirm delivery</h3>
                <p class="text-secondary" th:text="#{deliver.help}">Before saving, compare the physical item with the photo and verify the customer's phone number and pickup code.</p>
                <form th:action="@{/items/{id}/deliver(id=${item.id})}" th:object="${deliveryForm}" method="post" class="vstack gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="form-label" th:text="#{deliver.deliveredBy}">Delivered by</label>
                        <input class="form-control soft-input" th:field="*{deliveredBy}">
                        <div class="field-error" th:if="${#fields.hasErrors('deliveredBy')}" th:errors="*{deliveredBy}"></div>
                    </div>
                    <div>
                        <label class="form-label" th:text="#{deliver.note}">Confirmation note</label>
                        <textarea rows="4" class="form-control soft-input" th:field="*{deliveryConfirmationNote}"></textarea>
                        <div class="field-error" th:if="${#fields.hasErrors('deliveryConfirmationNote')}" th:errors="*{deliveryConfirmationNote}"></div>
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary rounded-pill px-4" th:text="#{delivery.confirmDelivery}">Mark as delivered</button>
                        <a class="btn btn-outline-dark rounded-pill px-4" th:href="@{/items/{id}(id=${item.id})}" th:text="#{action.cancel}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
